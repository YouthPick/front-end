# /api 로 오는 요청을 같은 컨테이너 네트워크의 backend 서비스로 프록시한다.
# 프론트/백엔드가 브라우저 기준 같은 origin(도메인)이 되어 CORS 자체가 발생하지 않는다.
# STOMP(WebSocket, /api/ws)도 같은 prefix라 이 location 하나로 함께 처리된다.
map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_http_version 1.1;

        # WebSocket(STOMP) upgrade 지원
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        # 유휴 커넥션이 끊기지 않도록 heartbeat 간격(WebSocketConfig, 10s)보다 여유 있게 잡는다.
        proxy_read_timeout 3600s;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
