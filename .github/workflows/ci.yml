name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

# 동일 브랜치/PR에서 새 커밋이 푸시되면 진행 중인 실행을 취소한다.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint & typecheck
        run: pnpm run lint

      - name: Build
        run: pnpm run build
