services:
  frontend:
    build:
      context: .
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
        VITE_CHATBOT_API_BASE_URL: ${VITE_CHATBOT_API_BASE_URL:-}
    container_name: bop-frontend-web
    environment:
      NODE_ENV: production
      CI: "true"
      PNPM_CONFIG_CONFIRM_MODULES_PURGE: "false"
    command: ["node", "./node_modules/vite/bin/vite.js", "preview", "--host", "0.0.0.0", "--port", "4000"]
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/ | grep -q '<!doctype html>'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      bop-local:
        aliases:
          - frontend

networks:
  bop-local:
    external: true
    name: bop-infra_bop-local
